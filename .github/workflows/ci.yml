name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest

    # Поднимаем PostgreSQL на случай, если тестам нужна БД.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: edukanban
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/edukanban?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npx prisma generate --schema apps/api/prisma/schema.prisma

      # Если тесты используют БД — применит миграции; если нет, шаг не помешает.
      - name: Apply migrations
        run: npm run db:migrate --if-present
        continue-on-error: true

      # Линтер, если в проекте есть скрипт "lint" (см. пункт про ESLint ниже).
      - name: Lint
        run: npm run lint --if-present

      - name: Build
        run: npm run build

      - name: Test
        run: npm test
