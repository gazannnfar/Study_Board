services:
  postgres:
    image: postgres:16-alpine
    container_name: edukanban-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: edukanban
      POSTGRES_PASSWORD: edukanban
      POSTGRES_DB: edukanban
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U edukanban -d edukanban"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
